<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Downloading Astra</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}

body{
  background:#0b0b0b;
  color:#fff;
  font-family:'DM Sans',sans-serif;
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  overflow:hidden;
}

body::before{
  content:'';
  position:fixed;inset:0;
  background-image: linear-gradient(rgba(255,255,255,0.025) 1px, transparent 1px),
                    linear-gradient(90deg, rgba(255,255,255,0.025) 1px, transparent 1px);
  background-size:64px 64px;
}

.wrap{
  text-align:center;
  z-index:1;
}

.logo-wrap{
  position:relative;
  width:130px; height:130px;
  margin:0 auto 40px;
  display:flex;
  align-items:center;
  justify-content:center;
}

.logo-glow, .ring{
  position:absolute;
  inset:0;
  border-radius:50%;
}

.logo-glow{
  background:radial-gradient(circle, rgba(0,255,150,0.2) 0%, transparent 70%);
  animation:glowPulse 2s ease-in-out infinite;
}

@keyframes glowPulse{ 0%,100%{transform:scale(1)} 50%{transform:scale(1.15)} }

.ring{
  border:1px solid rgba(0,255,150,0.3);
  animation:ringExpand 2.8s linear infinite;
}
.ring:nth-child(3){animation-delay:0.9s; opacity:0.6}

@keyframes ringExpand{
  from{transform:scale(0.6); opacity:1}
  to{transform:scale(2); opacity:0}
}

.logo-img{
  width:85px;
  height:85px;
  object-fit:contain;
  z-index:2;
  filter:drop-shadow(0 0 25px rgba(0,255,150,0.6));
}

.msg-area{
  height:55px;
  margin-bottom:30px;
  position:relative;
}

.msg{
  font-family:'Syne',sans-serif;
  font-weight:800;
  font-size:1.35rem;
  letter-spacing:0.06em;
  position:absolute;
  width:100%;
  opacity:0;
  transition:all 0.45s ease;
}

.msg.show{opacity:1;}

.progress-track{
  width:320px;
  height:4px;
  background:rgba(255,255,255,0.08);
  margin:0 auto 14px;
  border-radius:2px;
  overflow:hidden;
}

.progress-fill{
  height:100%;
  background:linear-gradient(90deg, #00ff9d, #ffffff);
  width:0%;
  transition:width 0.85s ease;
}

.pct{
  font-family:'Syne',sans-serif;
  font-size:0.78rem;
  letter-spacing:0.2em;
  color:#00ff9d;
}

/* URL Bar */
.url-bar{
  position:fixed;
  bottom:35px;
  left:50%;
  transform:translateX(-50%);
  background:rgba(10,10,10,0.85);
  border:1px solid #00ff9d;
  padding:9px 18px;
  border-radius:50px;
  font-family:monospace;
  font-size:0.82rem;
  color:#00ff9d;
  white-space:nowrap;
  min-width:300px;
  text-align:center;
  box-shadow:0 0 15px rgba(0,255,150,0.3);
}
</style>
</head>
<body>

<div class="wrap">
  <div class="logo-wrap">
    <div class="logo-glow"></div>
    <div class="ring"></div>
    <div class="ring"></div>
    <img class="logo-img" src="logo.png" alt="Astra"/>
  </div>

  <div class="msg-area">
    <div class="msg show" id="m0">Connecting to secure server...</div>
    <div class="msg" id="m1">Bypassing verification...</div>
    <div class="msg" id="m2">Downloading package...</div>
    <div class="msg" id="m3">Almost there...</div>
    <div class="msg" id="m4">Ready!</div>
  </div>

  <div class="progress-track">
    <div class="progress-fill" id="bar"></div>
  </div>
  <div class="pct" id="pct">0%</div>
</div>

<div class="url-bar" id="urlbar">https://download-tau-five.vercel.app/verify</div>

<script>
const FILE_NAME = "astra.zip";

const urlList = [
  "https://download-tau-five.vercel.app/verify?token=9377ee10",
  "https://download-tau-five.vercel.app/session?id=ak392x",
  "https://download-tau-five.vercel.app/dl?file=astra-v9377",
  "https://download-tau-five.vercel.app/processing/node7842",
  "https://download-tau-five.vercel.app/secure/download",
  "https://download-tau-five.vercel.app/finalize?h=3928fK",
  "https://download-tau-five.vercel.app/auth?ref=tau",
  "https://download-tau-five.vercel.app/loading?progress=active"
];

const bar = document.getElementById('bar');
const pct = document.getElementById('pct');
const urlbar = document.getElementById('urlbar');

let index = 0;

// SUPER FAST URL SPAM
function spamFullURL() {
  setInterval(() => {
    index = (index + 1) % urlList.length;
    urlbar.textContent = urlList[index];
    
    // Also change real browser URL (path only)
    history.pushState(null, '', '/dl/' + Date.now().toString(36));
  }, 180); // Very fast
}

const steps = [
  {id:'m0', p:20, t:0},
  {id:'m1', p:48, t:1100},
  {id:'m2', p:75, t:2400},
  {id:'m3', p:92, t:3800},
  {id:'m4', p:100, t:4900}
];

steps.forEach((step, i) => {
  setTimeout(() => {
    if(i > 0){
      document.getElementById(steps[i-1].id).classList.remove('show');
    }
    document.getElementById(step.id).classList.add('show');
    
    bar.style.width = step.p + '%';
    pct.textContent = step.p + '%';

    if(i === steps.length - 1){
      setTimeout(() => {
        const a = document.createElement('a');
        a.href = FILE_NAME;
        a.download = FILE_NAME;
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
      }, 600);
    }
  }, step.t);
});

spamFullURL();
</script>
</body>
</html>
