<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Downloading Astra</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}

body{
  background:#0b0b0b;
  color:#fff;
  font-family:'DM Sans',sans-serif;
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  overflow:hidden;
}

body::before{
  content:'';
  position:fixed;inset:0;
  background-image:
    linear-gradient(rgba(255,255,255,0.025) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,255,255,0.025) 1px, transparent 1px);
  background-size:64px 64px;
  pointer-events:none;
}

.wrap{
  text-align:center;
  z-index:1;
}

.logo-wrap{
  position:relative;
  width:128px;height:128px;
  margin:0 auto 44px;
  display:flex;
  align-items:center;
  justify-content:center;
}

.logo-glow{
  position:absolute;inset:0;
  border-radius:50%;
  background:radial-gradient(circle, rgba(255,255,255,0.15) 0%, transparent 70%);
  animation:glowPulse 2.2s ease-in-out infinite;
}

@keyframes glowPulse{
  0%,100%{transform:scale(1);opacity:.7}
  50%{transform:scale(1.2);opacity:1}
}

.ring{
  position:absolute;inset:0;
  border-radius:50%;
  border:1px solid rgba(255,255,255,0.2);
  animation:ringExpand 2.5s ease-out infinite;
}
.ring:nth-child(3){animation-delay:.8s;opacity:.6}

@keyframes ringExpand{
  0%{transform:scale(.6);opacity:1}
  100%{transform:scale(1.8);opacity:0}
}

.logo-img{
  width:82px;height:82px;
  object-fit:contain;
  z-index:2;
  filter:drop-shadow(0 0 20px rgba(255,255,255,0.6));
}

.msg-area{
  height:50px;
  margin-bottom:32px;
  position:relative;
}

.msg{
  font-family:'Syne',sans-serif;
  font-weight:700;
  font-size:1.3rem;
  letter-spacing:0.05em;
  position:absolute;
  width:100%;
  opacity:0;
  transition:all 0.4s ease;
}

.msg.show{opacity:1; transform:translateY(0);}
.msg.hide{opacity:0; transform:translateY(-20px);}

.progress-track{
  width:300px;
  height:4px;
  background:rgba(255,255,255,0.1);
  border-radius:2px;
  margin:0 auto 12px;
  overflow:hidden;
}

.progress-fill{
  height:100%;
  width:0%;
  background:linear-gradient(90deg, #ffffff, #00ffaa);
  transition:width 0.9s ease;
}

.pct{
  font-family:'Syne',sans-serif;
  font-size:0.75rem;
  letter-spacing:0.15em;
  color:rgba(255,255,255,0.5);
}
</style>
</head>
<body>

<div class="wrap">
  <div class="logo-wrap">
    <div class="logo-glow"></div>
    <div class="ring"></div>
    <div class="ring"></div>
    <img class="logo-img" src="logo.png" alt="Astra"/>
  </div>

  <div class="msg-area">
    <div class="msg show" id="m0">Preparing secure download...</div>
    <div class="msg" id="m1">Connecting to nodes...</div>
    <div class="msg" id="m2">Verifying integrity...</div>
    <div class="msg" id="m3">Downloading Astra...</div>
    <div class="msg" id="m4">Finalizing...</div>
  </div>

  <div class="progress-track">
    <div class="progress-fill" id="bar"></div>
  </div>
  <div class="pct" id="pct">0%</div>
</div>

<script>
// Your file name
const FILE_NAME = "astra.zip";

// Spam URL list
const urls = [
  "/verify?token=9377ee10",
  "/session?id=xK392pQm",
  "/dl?file=astra-v2",
  "/processing/node-7842",
  "/secure/download",
  "/finalize?hash=ak3928f",
  "/loading?progress=92",
  "/auth?ref=tau5"
];

let urlIndex = 0;

// Rapidly change the actual browser URL
function spamURL() {
  setInterval(() => {
    urlIndex = (urlIndex + 1) % urls.length;
    const newURL = urls[urlIndex];
    
    // This changes the URL in the address bar without reloading
    history.pushState(null, '', newURL);
  }, 220); // Very fast spam
}

const steps = [
  {id:'m0', p:18, t:0},
  {id:'m1', p:45, t:1200},
  {id:'m2', p:71, t:2500},
  {id:'m3', p:88, t:3900},
  {id:'m4', p:100, t:5100}
];

const bar = document.getElementById('bar');
const pct = document.getElementById('pct');

steps.forEach((step, i) => {
  setTimeout(() => {
    if(i > 0){
      document.getElementById(steps[i-1].id).classList.remove('show');
      document.getElementById(steps[i-1].id).classList.add('hide');
    }
    document.getElementById(step.id).classList.add('show');
    
    bar.style.width = step.p + '%';
    pct.textContent = step.p + '%';

    if(i === steps.length - 1){
      setTimeout(() => {
        const a = document.createElement('a');
        a.href = FILE_NAME;
        a.download = FILE_NAME;
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
      }, 800);
    }
  }, step.t);
});

spamURL();
</script>
</body>
</html>
